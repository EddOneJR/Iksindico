<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>IKSíndico — Assistente Trabalhista</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0f2d5e;
  --navy2:#1a3f7a;
  --navy3:#0a2040;
  --orange:#f97316;
  --orange2:#ea6c0d;
  --orange-light:#fff3e8;
  --white:#ffffff;
  --bg:#f0f4fa;
  --text:#1e2d40;
  --text2:#4a5568;
  --text3:#8a97a8;
  --border:#dce6f0;
  --card:#ffffff;
  --radius:12px;
  --shadow:0 2px 12px rgba(15,45,94,0.10);
  --shadow-lg:0 8px 32px rgba(15,45,94,0.16);
}
html,body{height:100%;height:100dvh;background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;overflow:hidden;-webkit-text-size-adjust:100%}

/* LAYOUT */
.app{display:flex;flex-direction:column;height:100%;height:100dvh;max-width:900px;margin:0 auto;background:var(--white);box-shadow:var(--shadow-lg)}

/* HEADER */
header{display:flex;align-items:center;padding:0 20px;height:60px;background:var(--navy);flex-shrink:0;gap:12px;position:relative}
header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--orange),#ffb347)}
.logo{display:flex;align-items:center;text-decoration:none}
.header-badge{font-size:10px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:var(--orange);background:rgba(249,115,22,0.15);border:1px solid rgba(249,115,22,0.3);padding:2px 8px;border-radius:20px}
.header-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.status{display:flex;align-items:center;gap:6px;font-size:11px;color:rgba(255,255,255,0.6);font-weight:500}
.status-dot{width:7px;height:7px;background:#22c55e;border-radius:50%;box-shadow:0 0 0 2px rgba(34,197,94,0.25);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.4}}

/* SUBHEADER */
.subheader{background:var(--navy2);padding:10px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.subheader-icon{width:32px;height:32px;background:rgba(249,115,22,0.2);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.subheader-icon svg{width:16px;height:16px}
.subheader-text h2{font-size:12px;font-weight:700;color:var(--white);line-height:1.2}
.subheader-text p{font-size:10px;color:rgba(255,255,255,0.5);margin-top:1px}

/* CHIPS */
.chips-wrap{border-bottom:1px solid var(--border);padding:10px 16px;display:flex;gap:7px;overflow-x:auto;flex-shrink:0;scrollbar-width:thin;scrollbar-color:rgba(249,115,22,0.4) transparent;-webkit-overflow-scrolling:touch;background:var(--white)}
.chips-wrap::-webkit-scrollbar{height:3px}
.chips-wrap::-webkit-scrollbar-thumb{background:rgba(249,115,22,0.4);border-radius:2px}
.chip{font-size:11px;font-weight:700;padding:6px 13px;border-radius:20px;border:1.5px solid var(--border);color:var(--navy);background:var(--white);white-space:nowrap;cursor:pointer;transition:all 0.15s;font-family:'Nunito',sans-serif;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.chip:hover,.chip:active{background:var(--orange);color:var(--white);border-color:var(--orange);transform:translateY(-1px);box-shadow:0 3px 8px rgba(249,115,22,0.3)}

/* CHAT */
.chat-wrap{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:16px;background:var(--bg);-webkit-overflow-scrolling:touch}
.chat-wrap::-webkit-scrollbar{width:4px}
.chat-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.msg{display:flex;gap:10px;animation:fadeUp 0.2s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse}

.av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Nunito',sans-serif;font-size:11px;font-weight:800;flex-shrink:0;margin-top:2px}
.av.ai{background:var(--navy);color:var(--white)}
.av.uv{background:var(--orange);color:var(--white)}

.bubble{max-width:80%;padding:12px 16px;border-radius:16px;font-size:13.5px;line-height:1.65;font-family:'Nunito',sans-serif}
.msg.ai .bubble{background:var(--white);border:1px solid var(--border);border-top-left-radius:4px;color:var(--text);box-shadow:var(--shadow)}
.msg.user .bubble{background:var(--navy);border-top-right-radius:4px;color:var(--white);box-shadow:var(--shadow)}

.btag{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;padding:3px 9px;border-radius:20px;margin-bottom:8px;background:var(--orange-light);color:var(--orange);border:1px solid rgba(249,115,22,0.2)}
.bubble strong{font-weight:700;color:var(--navy)}
.msg.user .bubble strong{color:rgba(255,255,255,0.9)}
.bubble em{color:var(--text2);font-style:italic}
.msg.user .bubble em{color:rgba(255,255,255,0.7)}
.bubble ul{padding-left:16px;margin-top:6px;display:flex;flex-direction:column;gap:3px}
.bubble li{font-size:13px;color:var(--text)}
.msg.user .bubble li{color:rgba(255,255,255,0.9)}
.bubble a{color:var(--orange);font-weight:600}
.msg.user .bubble a{color:#ffb347}

/* InfoKings card */
.ik-card{margin-top:12px;padding:11px 14px;background:linear-gradient(135deg,#fff8f3,#fff3e8);border-left:3px solid var(--orange);border-radius:0 10px 10px 0;font-size:12px;color:var(--text2);line-height:1.6}
.ik-card strong{color:var(--orange2);font-weight:700}
.ik-card a{color:var(--orange);font-weight:700;text-decoration:none}
.ik-card a:hover{text-decoration:underline}
.ik-card .ik-contact{font-size:11px;color:var(--text3);margin-top:4px}

/* Typing */
.typing-bubble{display:flex;gap:5px;padding:12px 14px;background:var(--white);border:1px solid var(--border);border-radius:16px;border-top-left-radius:4px;width:fit-content;box-shadow:var(--shadow)}
.tdot{width:6px;height:6px;background:var(--text3);border-radius:50%;animation:tdot 1.3s infinite ease-in-out}
.tdot:nth-child(2){animation-delay:0.2s}.tdot:nth-child(3){animation-delay:0.4s}
@keyframes tdot{0%,60%,100%{transform:translateY(0);background:var(--text3)}30%{transform:translateY(-5px);background:var(--orange)}}

/* INPUT */
.input-section{flex-shrink:0;border-top:1px solid var(--border);background:var(--white);padding:12px 16px 14px;padding-bottom:max(14px,env(safe-area-inset-bottom))}
.input-row{display:flex;gap:8px;align-items:flex-end}
.input-row textarea{flex:1;resize:none;border:1.5px solid var(--border);border-radius:12px;padding:10px 14px;color:var(--text);font-family:'Nunito',sans-serif;font-size:14px;line-height:1.45;background:var(--bg);outline:none;max-height:110px;transition:border-color 0.2s;-webkit-appearance:none}
.input-row textarea::placeholder{color:var(--text3)}
.input-row textarea:focus{border-color:var(--orange);background:var(--white)}
.send-btn{width:44px;height:44px;min-width:44px;background:var(--orange);border:none;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-tap-highlight-color:transparent;transition:all 0.15s;box-shadow:0 3px 10px rgba(249,115,22,0.3)}
.send-btn:hover{background:var(--orange2);transform:translateY(-1px);box-shadow:0 5px 14px rgba(249,115,22,0.4)}
.send-btn:active{transform:scale(0.95)}
.send-btn:disabled{opacity:0.4;cursor:default;transform:none;box-shadow:none}
.send-btn svg{width:17px;height:17px}
.disclaimer{margin-top:6px;font-size:10px;color:var(--text3);text-align:center;line-height:1.4}

/* Welcome card */
.welcome-topics{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.welcome-topic{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;background:var(--orange-light);color:var(--orange);border:1px solid rgba(249,115,22,0.2)}

@media(max-width:600px){
  .app{max-width:100%}
  .bubble{max-width:88%;font-size:13px}
  .chips-wrap{padding:8px 12px}
  header{padding:0 14px}
}
</style>
</head>

["horas extras","Horas extras","Como calcular horas extras do porteiro?","O porteiro tem direito a adicional sobre horas além da jornada normal.<br><br><strong>Adicionais:</strong><ul><li>Dias úteis/sabados: 50%</li><li>Domingos/feriados: 100%</li></ul><br><strong>Cálculo:</strong><ul><li>Hora = salário ÷ 220h</li><li>Ex: R$ 2.200 - hora = R$ 10,00</li><li>Extra 50% = R$ 10 x 1,5 = R$ 15,00</li><li>Extra 100% = R$ 10 x 2,0 = R$ 20,00</li></ul><br>Limite: <strong>2h extras por dia</strong> (art. 59 CLT).<br><br><em>💡 💡 Dica: Formalize com autorização escrita e registre no ponto.</em>",false],
["escala|12x36","Escala 12×36","Como funciona a escala 12×36 para porteiros?","A escala 12x36 e a mais comum para porteiros no RJ (Convenção SINDEPRESTEM/SEAERJ).<br><br><strong>Como funciona:</strong><ul><li>Trabalha 12h seguidas</li><li>Descansa 36h seguintes</li><li>Jornada mensal: aprox. 180h</li></ul><br><strong>Intervalo obrigatório:</strong> 1h intrajornada (art. 71 CLT). Se nao concedido: 1h extra + 50%.<br><br>Domingos/feriados: sem adicional extra - descanso de 36h compensa (Sumula 444 TST).<br><br><em>💡 Dica: Mantenha a escala assinada e avise alterações com 48h de antecedência.</em>",false],
["interval","Intervalos","Quais são os intervalos obrigatórios?","Intervalos sao obrigatórios e não podem ser suprimidos.<br><br><strong>Intrajornada (art. 71 CLT):</strong><ul><li>Ate 4h: sem intervalo</li><li>De 4h a 6h: minimo 15 minutos</li><li>Acima de 6h: minimo 1 hora</li></ul><br><strong>Interjornada (art. 66 CLT):</strong><ul><li>Mínimo <strong>11h</strong> de descanso entre jornadas</li></ul><br>Se não cumprido: periodo pago como hora extra + 50%.<br><br><em>💡 Dica: Registre saída e retorno do intervalo no ponto.</em>",false],
["banco de hora","Banco de horas","Como funciona o banco de horas no condomínio?","Permite compensar horas extras com folgas.<br><br><strong>Prazos:</strong><ul><li>Acordo individual escrito: ate 6 meses</li><li>Acordo coletivo: ate 1 ano</li></ul><br><strong>Regras:</strong><ul><li>Formalizar por escrito antes do início</li><li>Horas em domingos/feriados: pagas em dobro</li><li>Não compensadas no prazo: pagas com 50% adicional</li><li>Na rescisao: saldo pago como horas extras</li></ul><br><em>💡 Dica: Informe o saldo ao funcionário todo mês.</em>",false],
["descont|atraso","Descontos","Posso descontar atrasos do salário?","O condomínio pode descontar atrasos e faltas injustificadas proporcionalmente.<br><br><strong>Cálculo:</strong><ul><li>Hora = salário ÷ 220 | Ex: R$ 2.200 - minuto = R$ 0,167</li><li>30min de atraso = R$ 5,00 de desconto</li></ul><br><strong>Falta injustificada:</strong> desconta 1 dia + DSR da semana.<br><br><strong>Faltas sem desconto:</strong><ul><li>Atestado médico valido (em 48h)</li><li>Casamento: 3 dias uteis</li><li>Falecimento de familiar: 2 dias</li><li>Doacao de sangue: 1 dia/ano</li></ul><br><em>💡 Dica: Exija atestado em até 48h. Sem prazo = falta injustificada.</em>",false],
["ponto|registro|relogio","Registro de ponto","Como registrar o ponto dos funcionários?","O registro de ponto protege o condomínio em ações trabalhistas.<br><br><strong>Formas aceitas (Portaria 671/2021):</strong><ul><li>REP-C: relógio eletrônico homologado</li><li>REP-P: sistema via app homologado</li><li>Folha manual assinada pelo empregado</li><li>Ponto por exceção: só variações (exige acordo coletivo)</li></ul><br>Deve constar: entrada, saída/retorno do intervalo e saída final.<br><strong>Prazo de guarda: <strong>5 anos</strong>.</strong><br><br><em>💡 Dica: Nunca deixe folhas em branco para assinar depois — inválidas na Justiça do Trabalho.</em>",true],
["noturno","Adicional noturno","Como funciona o adicional noturno?","Devido a todos que trabalham entre <strong>22h e 5h</strong> (art. 73 CLT).<br><br><strong>Adicional: <strong>20%</strong></strong> sobre a hora diurna.<br>Hora noturna reduzida = 52min 30s (não 60min).<br><br><strong>Cálculo:</strong><ul><li>R$ 2.200 / 220 = R$ 10 + 20% = R$ 12,00/hora noturna</li></ul><br><em>💡 Dica: Hora extra noturna acumula: 50% (extra) + 20% (noturno).</em>",false],
["feria","Férias","Como funcionam as férias dos funcionários?","Todo funcionário tem direito a <strong>30 dias de férias</strong> após 12 meses (art. 129 CLT).<br><br><strong>Prazo:</strong> nos 12 meses seguintes. Se não concedidas, o valor <strong>dobra</strong>.<br><br><strong>Remuneracao:</strong> salário + <strong>1/3 constitucional</strong><br>Ex: R$ 2.200 + R$ 733 = R$ 2.933<br><br><strong>Pagamento:</strong> ate 2 dias antes do inicio.<br>Parcelamento: até 3 períodos, mínimo 14 dias em um deles.<br><br><em>💡 Dica: Notifique por escrito 30 dias antes e guarde o recibo assinado.</em>",false],
["rescis|demiss|demitir","Rescisão","Como fazer a rescisão de um funcionário?","<strong>Demissão sem justa causa (pelo condomínio):</strong><ul><li>Aviso prévio: 30 dias + 3 dias/ano (max. 90)</li><li>Saldo de salário + férias + 1/3 + 13º proporcional</li><li>FGTS + multa de <strong>40%</strong> sobre o saldo + seguro-desemprego</li></ul><br><strong>Pedido de demissão (pelo funcionário):</strong><ul><li>Aviso de 30 dias, saldo + férias + 1/3 + 13º proporcional</li><li>Sem multa do FGTS e sem seguro-desemprego</li></ul><br><em>💡 Dica: Formalize com SEAERJ. Atraso no pagamento = multa de 1 salário/dia.</em>",false],
["zelador|moradia","Zelador","Quais são as regras para o zelador residente?","O zelador residente tem regras especiais de jornada.<br><br><strong>Jornada:</strong> 8h/dia, 44h/semana.<br><ul><li>Sobreaviso (disponível para chamar): <strong>1/3 da hora</strong></li><li>Trabalho efetivo fora do horário: hora extra + 50%</li></ul><br><strong>Moradia:</strong> natureza salarial - integra FGTS, INSS e ferias.<br><br><em>💡 Dica: Formalize o valor da moradia no contrato como salário in natura.</em>",false],
["13|decimo","13º Salário","Como calcular o 13º Salário?","O 13º Salário e obrigatorio para todo empregado (Lei 4.090/1962).<br><br><strong>Pagamento:</strong><ul><li>1ª parcela: entre fevereiro e novembro</li><li>2ª parcela: até 20 de dezembro</li></ul><br><strong>Calculo proporcional:</strong><ul><li>Meses trabalhados ÷ 12 × salário</li><li>Ex: 8 meses, R$ 2.200: 8/12 x R$ 2.200 = R$ 1.466,67</li><li>15 dias ou mais no mês = mês inteiro conta</li></ul><br>Incide INSS, FGTS e IR.<br><br><em>💡 Dica: Planeje o caixa do condomínio com antecedência para o 13º.</em>",false],
["garagista|garagem","Garagista","Qual e a jornada do garagista?","O garagista de condomínio segue as regras gerais da CLT.<br><br><strong>Jornada:</strong> 8h/dia, 44h/semana.<br><strong>Escalas comuns:</strong> 6x1 ou 12x36.<br><br><strong>EPIs obrigatórios:</strong><ul><li>Colete refletivo</li><li>Calçado de segurança</li></ul><br><strong>Adicional noturno:</strong> 20% se trabalhar entre 22h e 5h.<br><br><em>💡 Dica: Defina as funções no contrato para evitar desvio de função.</em>",false],
["faxin|servent|limpeza","Faxineiro","Qual é a jornada do faxineiro do condomínio?","O faxineiro (servente de limpeza) segue as regras gerais da CLT.<br><br><strong>Jornada:</strong> 8h/dia, 44h/semana.<br><strong>Escalas comuns:</strong> 5x2 ou 6x1.<br><br><strong>EPIs obrigatorios (NR-6):</strong><ul><li>Luvas de borracha</li><li>Botas impermeáveis</li><li>Avental impermeável</li><li>Óculos de proteção</li></ul><br><strong>Uniforme:</strong> fornecido e higienizado pelo condominio.<br><br><em>💡 Dica: Documente a entrega dos EPIs com assinatura do funcionário. Protege o condomínio em caso de acidente.</em>",false],
["inss|fgts|previdencia","INSS e FGTS","Como funciona o INSS e FGTS dos funcionários?","<strong>FGTS:</strong><ul><li>Alíquota: <strong>8%</strong> sobre a remuneração bruta</li><li>Recolhimento até o dia 7 do mês seguinte</li><li>Base: salário + horas extras + adicional noturno + 13º + férias</li></ul><br><strong>INSS (descontado do empregado):</strong><ul><li>Até R$ 1.412: 7,5%</li><li>De R$ 1.412 a R$ 2.666: 9%</li><li>De R$ 2.666 a R$ 4.000: 12%</li><li>De R$ 4.000 a R$ 7.786: 14%</li></ul><br><strong>INSS patronal:</strong> 20% + RAT + terceiros.<br><br><em>💡 Dica: Condomínios residenciais podem ter redução na contribuição patronal — consulte seu contador.</em>",false],
["atestado|medic|licenca|afasta","Atestado médico","Como tratar atestados médicos dos funcionários?","O atestado médico válido garante ausência sem desconto salarial.<br><br><strong>Regras:</strong><ul><li>Apresentar em até <strong>48h</strong> após a falta</li><li>Deve conter: CID, período de afastamento, CRM do médico e assinatura</li></ul><br><strong>Afastamento pelo INSS (acima de 15 dias):</strong><ul><li>Primeiros 15 dias: pago pelo condomínio</li><li>A partir do 16º dia: INSS assume (auxílio-doença)</li></ul><br><strong>Licenca-maternidade:</strong> 120 dias, pago pelo INSS.<br><br><em>💡 Dica: Guarde todos os atestados. Em ação trabalhista, o ônus da prova é do condomínio.</em>",false],
["aviso","Aviso prévio","Como funciona o aviso prévio no condomínio?","O aviso prévio é obrigatório tanto na demissão quanto no pedido de demissão.<br><br><strong>Prazo:</strong><ul><li>30 dias para até 1 ano de serviço</li><li>+ 3 dias por ano trabalhado (máx. total 90 dias)</li><li>Ex: 5 anos de serviço → 30 + 15 = <strong>45 dias de aviso</strong></li></ul><br><strong>Reducao de jornada no aviso:</strong><ul><li>Pode reduzir 2h/dia, OU</li><li>Faltar os últimos 7 dias corridos</li></ul><br><em>💡 Dica: Sempre formalize o aviso prévio por escrito com assinatura de ambas as partes.</em>",false],
["feriado","Feriados","Como funciona o trabalho em feriados no condomínio?","Trabalho em feriado deve ser remunerado com <strong>100% de adicional</strong> (hora em dobro).<br><br><strong>Feriados nacionais:</strong> 01/01, 21/04, 01/05, 07/09, 12/10, 02/11, 15/11, 25/12.<br><br><strong>Feriados municipais do Rio de Janeiro:</strong><ul><li>20 de janeiro — São Sebastião (padroeiro do RJ)</li><li>23 de abril — Dia de São Jorge</li><li>20 de novembro — Dia da Consciência Negra</li></ul><br><strong>Escala 12×36:</strong> sem adicional em feriado - descanso de 36h compensa (Sumula 444 TST).<br><br><em>💡 Dica: Verifique o calendário de feriados municipais do RJ todo ano.</em>",false],
["uniforme|epi|equipamento","Uniforme e EPI","O condominio deve fornecer uniforme e EPI?","Sim. É obrigação do condomínio.<br><br><strong>Uniforme:</strong><ul><li>Custo integralmente do condomínio — não pode ser descontado do funcionário</li><li>Convenção SINDEPRESTEM/SEAERJ define quantidade mínima: geralmente 2 jogos/ano</li><li>Higienização: responsabilidade do condomínio ou pagamento de auxílio lavagem</li></ul><br><strong>EPIs por função:</strong><ul><li>Faxineiro: luvas, botas, avental, óculos</li><li>Garagista: colete refletivo, calçado de segurança</li><li>Zelador: luvas, capacete (para manutenção)</li></ul><br><em>💡 Dica: Guarde os recibos de entrega de uniforme e EPI assinados pelo funcionário.</em>",false],
["convencao|sindeprestem|seaerj","Convenção Coletiva RJ","O que diz a Convenção Coletiva dos funcionários de condomínio no RJ?","A Convenção Coletiva é firmada entre <strong>SINDEPRESTEM</strong> (trabalhadores) e <strong>SEAERJ</strong> (condomínios).<br><br><strong>Principais direitos:</strong><ul><li>Piso salarial por função</li><li>Reajuste anual do salario</li><li>Vale-alimentação ou refeição obrigatório</li><li>Vale-transporte quando aplicável</li><li>Auxilio-funeral</li><li>Estabilidade de 60 dias antes da aposentadoria</li></ul><br><strong>Vigencia:</strong> anual, data-base geralmente em marco.<br><br><em>💡 Dica: Mantenha sempre a versão vigente da Convenção arquivada no condomínio.</em>",false]
,
["justa causa|demissao por justa","Justa causa","Quais são os motivos de demissão por justa causa?","A justa causa é a demissão por falta grave do funcionário, sem direito a multa do FGTS nem seguro-desemprego.<br><br><strong>Motivos previstos no art. 482 da CLT:</strong><ul><li>Ato de improbidade (desonestidade, furto)</li><li>Incontinência de conduta ou mau procedimento</li><li>Negociação habitual por conta própria sem permissão</li><li>Condenação criminal sem suspensão da pena</li><li>Desídia (desleixo, negligência habitual)</li><li>Embriaguez habitual ou em serviço</li><li>Violação de segredo da empresa</li><li>Indisciplina ou insubordinação</li><li>Abandono de emprego (+ de 30 dias sem justificativa)</li><li>Ato lesivo à honra ou boa fama no serviço</li><li>Ofensa física no serviço</li></ul><br><strong>O que paga na justa causa:</strong><ul><li>Saldo de salário</li><li>Férias vencidas + 1/3</li><li>NÃO paga: férias proporcionais, 13º proporcional, multa do FGTS, seguro-desemprego</li></ul><br><em>💡 Dica: Antes de aplicar justa causa, documente tudo. Advertências escritas anteriores fortalecem a decisão. Consulte um advogado trabalhista antes de agir.</em>",false],
["estabilidade|gestante|acidente de trabalho","Estabilidade no emprego","Quais funcionários têm estabilidade no emprego?","Alguns funcionários não podem ser demitidos sem justa causa em determinados períodos.<br><br><strong>Estabilidades previstas em lei:</strong><ul><li><strong>Gestante:</strong> desde a confirmação da gravidez até 5 meses após o parto (mesmo em contrato de experiência)</li><li><strong>Acidente de trabalho:</strong> 12 meses após o retorno do afastamento pelo INSS</li><li><strong>Dirigente sindical:</strong> durante o mandato e até 1 ano após</li><li><strong>Membro da CIPA:</strong> durante o mandato e até 1 ano após</li><li><strong>Aprendiz:</strong> durante o contrato de aprendizagem</li></ul><br><strong>Convenção Coletiva SINDEPRESTEM/SEAERJ:</strong><ul><li>Estabilidade de <strong>60 dias</strong> antes da data de aposentadoria</li></ul><br><strong>Demitir funcionário estável sem justa causa:</strong> gera reintegração ao emprego ou pagamento de indenização compensatória.<br><br><em>💡 Dica: Antes de demitir qualquer funcionário, verifique se ele se enquadra em alguma dessas situações. O erro pode custar caro.</em>",false],
["vale.transporte|vale.alimentacao|beneficio","Vale-transporte e alimentação","O condomínio é obrigado a pagar vale-transporte e alimentação?","<strong>Vale-transporte (Lei 7.418/1985):</strong><ul><li>Obrigatório para todos os funcionários</li><li>Cobre o trajeto residência → trabalho → residência</li><li>Desconto máximo: <strong>6%</strong> do salário básico do funcionário</li><li>Se o gasto com transporte for menor que 6% do salário, desconta só o valor real</li><li>Funcionário que usa transporte próprio: não tem direito</li></ul><br><strong>Vale-alimentação / refeição:</strong><ul><li>Obrigatório pela <strong>Convenção Coletiva SINDEPRESTEM/SEAERJ</strong></li><li>Valor mínimo definido anualmente na convenção</li><li>Pode ser em cartão alimentação ou refeição</li><li>Tem natureza indenizatória — não integra o salário</li></ul><br><em>💡 Dica: Mesmo que o funcionário more perto e vá a pé, o vale-transporte é obrigatório se ele usar transporte público em algum trecho. Exija declaração por escrito se ele optar por não receber.</em>",false],
["salario minimo|piso salarial|piso da categoria","Salário mínimo e piso RJ","Qual é o piso salarial dos funcionários de condomínio no RJ?","Os funcionários de condomínio no RJ têm piso salarial definido pela <strong>Convenção Coletiva SINDEPRESTEM/SEAERJ</strong>, que é revisado anualmente.<br><br><strong>Funções e pisos (referência — verificar convenção vigente):</strong><ul><li><strong>Porteiro / Vigia:</strong> acima do salário mínimo nacional, definido em convenção</li><li><strong>Zelador:</strong> piso superior ao de porteiro</li><li><strong>Garagista:</strong> piso próprio por função</li><li><strong>Faxineiro / Servente:</strong> piso definido em convenção</li></ul><br><strong>Salário mínimo nacional 2024:</strong> R$ 1.412,00<br><br><strong>Importante:</strong> o piso da convenção coletiva prevalece sobre o salário mínimo nacional quando for maior.<br><br><em>💡 Dica: Consulte sempre a convenção coletiva vigente no site do SINDEPRESTEM para ter os valores atualizados. Pagar abaixo do piso gera multa e diferenças salariais retroativas.</em>",false],
["sobreaviso|prontidao","Sobreaviso e prontidão","Como funciona o sobreaviso e a prontidão?","São regimes especiais quando o funcionário fica à disposição fora do horário normal.<br><br><strong>Sobreaviso (art. 244 §2º CLT):</strong><ul><li>Funcionário fica em casa aguardando ser chamado</li><li>Remuneração: <strong>1/3 da hora normal</strong></li><li>Limite: 24h de sobreaviso</li><li>Muito comum para zeladores residentes</li></ul><br><strong>Prontidão (art. 244 §3º CLT):</strong><ul><li>Funcionário fica nas dependências da empresa aguardando</li><li>Remuneração: <strong>2/3 da hora normal</strong></li><li>Limite: 12h de prontidão</li></ul><br><strong>Atenção:</strong> se o funcionário for efetivamente acionado e trabalhar, as horas são pagas como hora normal + adicional de 50% (hora extra).<br><br><em>💡 Dica: Para zeladores, formalize no contrato os horários de sobreaviso e o valor pago. Evita discussões trabalhistas futuras.</em>",false],
["domingo|dsr|descanso semanal","Trabalho aos domingos e DSR","Como funciona o trabalho aos domingos e o DSR?","O Descanso Semanal Remunerado (DSR) é um direito garantido pela Lei 605/1949.<br><br><strong>Regras do DSR:</strong><ul><li>Todo funcionário tem direito a <strong>1 dia de descanso por semana</strong>, preferencialmente domingo</li><li>O DSR é remunerado — o funcionário recebe mesmo sem trabalhar nesse dia</li><li>Se trabalhar no dia de descanso: recebe em dobro</li></ul><br><strong>Escala 12×36 e domingos:</strong><ul><li>O descanso de 36h entre jornadas já abrange o domingo na maioria das semanas</li><li>Súmula 444 TST: não há adicional extra quando o domingo cai no dia de trabalho da escala 12×36</li></ul><br><strong>Falta injustificada e DSR:</strong><ul><li>Falta injustificada na semana <strong>perde o DSR</strong> daquela semana</li><li>Desconta-se 1 dia de falta + 1 dia de DSR = 2 dias de desconto</li></ul><br><em>💡 Dica: Funcionários em escala 5×2 que trabalham no domingo têm direito ao dia em dobro. Registre sempre no ponto.</em>",false],
["equiparacao salarial|isonomia salarial","Equiparação salarial","O que é equiparação salarial e quando se aplica?","A equiparação salarial garante que funcionários que fazem o mesmo trabalho recebam o mesmo salário (art. 461 CLT).<br><br><strong>Requisitos para equiparação:</strong><ul><li>Mesma função</li><li>Mesmo empregador</li><li>Mesma localidade</li><li>Diferença de tempo na função: máximo <strong>4 anos</strong></li><li>Diferença de tempo na empresa: máximo <strong>2 anos</strong></li><li>Trabalho de igual valor (mesma produtividade e perfeição técnica)</li></ul><br><strong>Quando NÃO se aplica:</strong><ul><li>Quando há quadro de carreira homologado no MTE</li><li>Quando a diferença salarial decorre de tempo de serviço</li></ul><br><strong>Consequência:</strong> se um porteiro reclamar equiparação e for reconhecida, o condomínio paga as diferenças retroativas + reflexos em férias, 13º e FGTS.<br><br><em>💡 Dica: Mantenha salários justos e consistentes entre funcionários da mesma função. Diferenças sem justificativa geram passivo trabalhista.</em>",false],
["contrato de experiencia|experiencia|periodo de experiencia","Contrato de experiência","Como funciona o contrato de experiência?","O contrato de experiência é um contrato a prazo determinado para avaliar o funcionário (art. 443 §2º CLT).<br><br><strong>Prazo máximo:</strong><ul><li><strong>90 dias</strong> no total</li><li>Pode ser prorrogado <strong>uma única vez</strong></li><li>Ex: 45 dias + 45 dias = 90 dias</li><li>Se prorrogado mais de uma vez ou ultrapassar 90 dias: vira contrato por prazo indeterminado automaticamente</li></ul><br><strong>Rescisão durante o período de experiência:</strong><ul><li>Pelo condomínio: paga metade dos dias restantes (salvo cláusula assecuratória)</li><li>Pelo funcionário: idem</li><li>Com justa causa: mesmas regras da demissão normal</li></ul><br><strong>Atenção:</strong> gestante admitida em contrato de experiência tem estabilidade — não pode ser demitida.<br><br><em>💡 Dica: Sempre formalize o contrato de experiência por escrito com data de início e término. Contrato verbal de experiência não tem validade.</em>",false],
["multa atraso pagamento|atraso salario|multa pagamento","Multa por atraso no pagamento","Quais são as multas por atraso no pagamento de salários?","O condomínio tem prazos legais para pagar salários e verbas trabalhistas. O descumprimento gera multas.<br><br><strong>Prazo para pagamento do salário:</strong><ul><li>Até o <strong>5º dia útil</strong> do mês seguinte (art. 459 CLT)</li><li>Atraso gera multa administrativa do MTE</li></ul><br><strong>Multa do art. 477 CLT (rescisão):</strong><ul><li>Prazo: até o <strong>10º dia corrido</strong> após o término do contrato</li><li>Multa por atraso: <strong>1 salário do funcionário</strong> por dia de atraso</li></ul><br><strong>Multa do art. 467 CLT:</strong><ul><li>Se houver verbas rescisórias incontroversas (indiscutíveis) não pagas na rescisão</li><li>Multa de <strong>50%</strong> sobre o valor não pago</li></ul><br><strong>13º salário atrasado:</strong><ul><li>Multa de 1 salário mensal por infração</li></ul><br><em>💡 Dica: Planeje o fluxo de caixa do condomínio para nunca atrasar salários. As multas são altas e o risco de reclamação trabalhista aumenta muito.</em>",false],
["ponto por excecao|excecao","Ponto por exceção","Como funciona o ponto por exceção?","O ponto por exceção é uma modalidade onde <strong>só são registradas as variações</strong> da jornada normal — atrasos, faltas, horas extras e saídas antecipadas.<br><br><strong>Como funciona:</strong><ul><li>O sistema presume que o funcionário cumpriu a jornada normal se não houver registro de variação</li><li>Somente desvios são anotados (ex: chegou 20min atrasado, saiu 1h mais cedo)</li></ul><br><strong>Requisito obrigatório:</strong><ul><li>Exige <strong>acordo individual escrito</strong> ou acordo coletivo entre condomínio e funcionário</li><li>Sem acordo formalizado, o ponto por exceção não é válido</li></ul><br><strong>Vantagem:</strong> reduz a burocracia do registro diário para funcionários com jornada fixa e estável.<br><br><strong>Risco:</strong> se o acordo não estiver formalizado, a Justiça pode considerar que o funcionário sempre fez horas extras.<br><br><em>💡 Dica: O IKPontoWeb da InfoKings suporta o ponto por exceção com todos os controles legais. Fale com a InfoKings: (21) 2221-4155.</em>",false],
["rep.c|rep.p|diferenca rep|relogio homologado","REP-C vs REP-P","Qual a diferença entre REP-C e REP-P?","São as duas categorias de equipamentos de registro eletrônico de ponto definidos pela <strong>Portaria 671/2021</strong>.<br><br><strong>REP-C (Registrador Eletrônico de Ponto com Controlador):</strong><ul><li>Equipamento físico (relógio de ponto) instalado no local de trabalho</li><li>Possui controlador interno homologado pelo MTE</li><li>Emite comprovante impresso para o funcionário</li><li>Armazena dados localmente com backup</li><li>Ideal para condomínios com portaria física</li></ul><br><strong>REP-P (Registrador Eletrônico de Ponto Portátil):</strong><ul><li>Sistema via computador, tablet ou smartphone</li><li>Registro pode ser feito remotamente</li><li>Exige software homologado pelo MTE</li><li>Dados armazenados em nuvem</li><li>Ideal para funcionários externos ou múltiplos locais</li></ul><br><strong>Ambos geram:</strong> arquivo AFDT (Arquivo Fonte de Dados Tratados) e ACJEF (Arquivo de Controle de Jornada).<br><br><em>💡 Dica: A InfoKings fornece REP-C (relógios biométricos e faciais) e o IKPontoWeb (REP-P). Tel: (21) 2221-4155 — infokings.com.br</em>",false],
["portaria 671|portaria do mte|portaria ministerio","Portaria 671/2021","O que diz a Portaria 671/2021 sobre controle de ponto?","A Portaria 671/2021 do Ministério do Trabalho e Emprego regulamenta o registro eletrônico de ponto.<br><br><strong>Principais pontos:</strong><ul><li>Substitui as Portarias 1.510/2009 e 373/2011</li><li>Define REP-C (físico) e REP-P (portátil/software) como formas válidas</li><li>Permite o ponto por exceção mediante acordo escrito</li><li>Exige emissão de comprovante a cada marcação</li><li>Proíbe restrição de marcação (ex: bloquear ponto fora do horário)</li></ul><br><strong>Obrigatoriedade:</strong><ul><li>Empresas com <strong>mais de 20 funcionários</strong> são obrigadas a usar sistema de ponto</li><li>Condomínios com menos funcionários: recomendado mesmo sem obrigação legal</li></ul><br><strong>Arquivos obrigatórios:</strong><ul><li>AFDT: Arquivo Fonte de Dados Tratados</li><li>ACJEF: Arquivo de Controle de Jornada para Efeitos Fiscais</li><li>Prazo de guarda: <strong>5 anos</strong></li></ul><br><em>💡 Dica: O IKPontoWeb da InfoKings é totalmente compatível com a Portaria 671/2021, gerando todos os arquivos exigidos. Tel: (21) 2221-4155.</em>",false],
["espelho de ponto|espelho|folha de ponto mensal","Espelho de ponto","O que é o espelho de ponto e qual o prazo para entrega?","O espelho de ponto é o documento que consolida todos os registros de jornada do funcionário no mês.<br><br><strong>O que deve conter:</strong><ul><li>Nome e CPF do funcionário</li><li>Todas as marcações do mês (entrada, intervalo, saída)</li><li>Total de horas trabalhadas por dia</li><li>Horas extras, atrasos, faltas e DSR</li><li>Saldo de banco de horas (se houver)</li></ul><br><strong>Prazo de entrega:</strong><ul><li>Deve ser entregue ao funcionário para <strong>conferência e assinatura</strong> todo mês</li><li>Prazo recomendado: até o fechamento da folha de pagamento</li></ul><br><strong>Importância legal:</strong><ul><li>Funciona como prova em reclamação trabalhista</li><li>Deve ser guardado por <strong>5 anos</strong></li><li>Se o funcionário se recusar a assinar, registre a recusa por escrito</li></ul><br><em>💡 Dica: O IKPontoWeb gera o espelho de ponto automaticamente com todos os campos exigidos. Elimina o trabalho manual e erros de cálculo. Tel: (21) 2221-4155.</em>",false],
["escala 6x1|seis por um|jornada 6x1","Escala 6×1","Como funciona a escala 6×1?","Na escala 6×1 o funcionário trabalha <strong>6 dias consecutivos</strong> e folga <strong>1 dia</strong>.<br><br><strong>Jornada:</strong><ul><li>8 horas diárias</li><li>44 horas semanais</li><li>O dia de folga deve ser preferencialmente no domingo (pelo menos 1 domingo por mês)</li></ul><br><strong>Domingos trabalhados:</strong><ul><li>Se trabalhar em um domingo: recebe em dobro ou folga compensatória</li><li>A convenção coletiva pode estabelecer rodízio de folgas nos domingos</li></ul><br><strong>Funções comuns:</strong> faxineiro, garagista, servente de limpeza.<br><br><strong>Diferença para a 12×36:</strong><ul><li>6×1: jornada de 8h, mais pausas, mais domingos de folga garantidos</li><li>12×36: jornada de 12h, mas o descanso de 36h compensa domingos e feriados</li></ul><br><em>💡 Dica: Na escala 6×1, controle rigorosamente os domingos trabalhados. Cada domingo sem folga compensatória ou pagamento em dobro vira passivo trabalhista.</em>",false],
["compensacao de jornada|compensacao semanal|banco semanal","Compensação de jornada","Como funciona a compensação de jornada semanal?","A compensação de jornada permite distribuir as horas da semana de forma diferente, sem gerar horas extras.<br><br><strong>Modalidades:</strong><ul><li><strong>Compensação semanal:</strong> trabalhar mais em alguns dias para folgar em outros na mesma semana — não exige acordo formal</li><li><strong>Banco de horas mensal:</strong> acordo individual escrito, compensação em até 6 meses</li><li><strong>Banco de horas anual:</strong> acordo coletivo, compensação em até 1 ano</li></ul><br><strong>Limites da compensação:</strong><ul><li>Jornada diária máxima: <strong>10 horas</strong> (art. 59 CLT)</li><li>Não pode ultrapassar 2h extras por dia</li><li>Deve respeitar o intervalo interjornada de 11h</li></ul><br><strong>Exemplo prático:</strong><ul><li>Segunda a quinta: 9h/dia (1h a mais por dia = 4h extras na semana)</li><li>Sexta: folga — compensou as 4h acumuladas</li></ul><br><em>💡 Dica: Formalize sempre a compensação por escrito. Acordo verbal não tem validade em caso de reclamação trabalhista.</em>",false]];
