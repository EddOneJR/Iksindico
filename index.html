<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#040d1a;--blue-mid:#0d2a52;--blue-accent:#1a5fb4;--gold:#f5a623;--gold-light:#ffc55a;--white:#fff;--muted:rgba(255,255,255,0.55);--border:rgba(255,255,255,0.08);--glow:rgba(26,95,180,0.4)}
html,body{height:100%;height:100dvh;background:var(--navy);color:var(--white);font-family:'Barlow',sans-serif;overflow:hidden;-webkit-text-size-adjust:100%}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 70% 20%,rgba(26,95,180,0.18) 0%,transparent 70%),radial-gradient(ellipse 60% 50% at 10% 80%,rgba(26,95,180,0.12) 0%,transparent 60%);pointer-events:none;z-index:0}
.grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(26,95,180,0.06) 1px,transparent 1px),linear-gradient(90deg,rgba(26,95,180,0.06) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.app{position:relative;z-index:1;display:flex;flex-direction:column;height:100%;height:100dvh;max-width:1100px;margin:0 auto}
nav{display:flex;align-items:center;padding:0 16px;height:56px;border-bottom:1px solid var(--border);background:rgba(4,13,26,0.95);backdrop-filter:blur(12px);flex-shrink:0;gap:8px}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none}
.logo-icon{width:32px;height:32px;flex-shrink:0}
.logo-icon svg{width:32px;height:32px}
.logo-text{font-family:'Exo 2',sans-serif;font-weight:800;font-size:18px;color:var(--white);letter-spacing:-0.3px}
.logo-text span{color:var(--gold)}
.nav-badge{font-size:9px;font-weight:700;font-family:'Exo 2',sans-serif;letter-spacing:1px;color:var(--gold);border:1px solid rgba(245,166,35,0.3);padding:2px 7px;border-radius:20px;text-transform:uppercase}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)}
.online-dot{width:7px;height:7px;background:#4ade80;border-radius:50%;box-shadow:0 0 6px #4ade80;animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.hero-strip{background:linear-gradient(90deg,var(--blue-mid) 0%,rgba(10,29,58,0.7) 100%);border-bottom:1px solid var(--glow);padding:10px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.hero-icon{width:38px;height:38px;background:rgba(245,166,35,0.12);border:1px solid rgba(245,166,35,0.25);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hero-icon svg{width:19px;height:19px}
.hero-text{flex:1;min-width:0}
.hero-text h1{font-family:'Exo 2',sans-serif;font-size:13px;font-weight:700;color:var(--white);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hero-text p{font-size:10px;color:var(--muted);margin-top:1px}
.chips-wrap{border-bottom:1px solid var(--border);padding:8px 16px;display:flex;gap:7px;overflow-x:auto;flex-shrink:0;-webkit-overflow-scrolling:touch;scrollbar-width:thin;scrollbar-color:rgba(245,166,35,0.5) rgba(255,255,255,0.05)}
.chips-wrap::-webkit-scrollbar{height:4px}.chips-wrap::-webkit-scrollbar-track{background:rgba(255,255,255,0.05);border-radius:2px}.chips-wrap::-webkit-scrollbar-thumb{background:rgba(245,166,35,0.5);border-radius:2px}
.chip{font-size:11px;font-weight:600;padding:6px 12px;border-radius:20px;border:1px solid var(--glow);color:rgba(255,255,255,0.75);background:rgba(26,95,180,0.18);white-space:nowrap;cursor:pointer;font-family:'Exo 2',sans-serif;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.chip:active{background:var(--gold);color:var(--navy);border-color:var(--gold)}
.chat-wrap{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px;-webkit-overflow-scrolling:touch}
.msg{display:flex;gap:10px;animation:fadeUp 0.2s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse}
.av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Exo 2',sans-serif;font-size:10px;font-weight:700;flex-shrink:0;margin-top:2px}
.av.ai{background:linear-gradient(135deg,var(--blue-accent),#0d2a52);border:1px solid rgba(26,95,180,0.5);color:#fff}
.av.uv{background:linear-gradient(135deg,var(--gold),#d4860d);color:var(--navy)}
.bubble{max-width:82%;padding:11px 14px;border-radius:14px;font-size:14px;line-height:1.6}
.msg.ai .bubble{background:rgba(255,255,255,0.06);border:1px solid var(--border);border-top-left-radius:4px;color:rgba(255,255,255,0.9)}
.msg.user .bubble{background:var(--blue-accent);border:1px solid rgba(26,95,180,0.5);border-top-right-radius:4px;color:#fff}
.btag{display:inline-block;font-size:10px;font-weight:600;font-family:'Exo 2',sans-serif;letter-spacing:0.5px;text-transform:uppercase;padding:2px 8px;border-radius:20px;margin-bottom:7px;background:rgba(245,166,35,0.15);color:var(--gold-light);border:1px solid rgba(245,166,35,0.2)}
.bubble strong{font-weight:600;color:var(--gold-light)}
.bubble em{color:rgba(255,255,255,0.65);font-style:italic}
.bubble ul{padding-left:16px;margin-top:5px;display:flex;flex-direction:column;gap:3px}
.bubble li{font-size:13.5px;color:rgba(255,255,255,0.85)}
.bubble a{color:var(--gold-light)}
.ik-card{margin-top:12px;padding:10px 12px;background:rgba(245,166,35,0.07);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;font-size:12px;color:rgba(255,255,255,0.7);line-height:1.6}
.ik-card strong{color:var(--gold)}
.ik-card a{color:var(--gold);text-decoration:none}
.typing-bubble{display:flex;gap:5px;padding:12px 14px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:14px;border-top-left-radius:4px;width:fit-content}
.tdot{width:6px;height:6px;background:rgba(255,255,255,0.35);border-radius:50%;animation:tdot 1.3s infinite ease-in-out}
.tdot:nth-child(2){animation-delay:0.2s}.tdot:nth-child(3){animation-delay:0.4s}
@keyframes tdot{0%,60%,100%{transform:translateY(0);background:rgba(255,255,255,0.3)}30%{transform:translateY(-5px);background:var(--gold)}}
.input-section{flex-shrink:0;border-top:1px solid var(--border);background:rgba(4,13,26,0.97);padding:10px 16px 12px;padding-bottom:max(12px,env(safe-area-inset-bottom))}
.input-row{display:flex;gap:8px;align-items:flex-end}
.input-row textarea{flex:1;resize:none;border:1px solid rgba(26,95,180,0.35);border-radius:12px;padding:10px 14px;color:var(--white);font-family:'Barlow',sans-serif;font-size:15px;line-height:1.45;background:rgba(255,255,255,0.06);outline:none;max-height:110px;-webkit-appearance:none}
.input-row textarea::placeholder{color:rgba(255,255,255,0.28)}
.input-row textarea:focus{border-color:var(--blue-accent)}
.send-btn{width:44px;height:44px;min-width:44px;background:var(--gold);border:none;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.send-btn:active{background:var(--gold-light);transform:scale(0.95)}
.send-btn:disabled{opacity:0.35}
.send-btn svg{width:17px;height:17px}
.disclaimer{margin-top:6px;font-size:10px;color:rgba(255,255,255,0.2);text-align:center}
</style>
</head>

<script>
var chatHistory = [];
var IK = '<div class="ik-card"><strong>InfoKings pode ajudar:</strong> Fornecemos relogios de ponto biometricos e faciais (venda ou locacao) e o <strong>IKPontoWeb</strong> - automatiza horas extras, banco de horas e gera a folha pronta.<br><span style="font-size:11px;color:rgba(255,255,255,0.4)">Tel: <a href="https://wa.me/552122214155" target="_blank">(21) 2221-4155</a> - <a href="https://infokings.com.br" target="_blank">infokings.com.br</a></span></div>';
var IKP = '<div class="ik-card"><strong>InfoKings e especialista nisso:</strong> Ha 24 anos fornecemos relogios de ponto biometricos e faciais (venda ou locacao) e o <strong>IKPontoWeb</strong> - 100% online, trata marcacoes, gera espelho de ponto e exporta para sua folha. Portaria 671/2021.<br><span style="font-size:11px;color:rgba(255,255,255,0.4)">Tel: <a href="https://wa.me/552122214155" target="_blank">(21) 2221-4155</a> - <a href="https://infokings.com.br" target="_blank">infokings.com.br</a></span></div>';

var TOPICS = [
["horas extras","Horas extras","Como calcular horas extras?","O porteiro tem direito a adicional sobre horas alem da jornada normal.<br><br><strong>Adicionais:</strong><ul><li>Dias uteis/sabados: 50%</li><li>Domingos/feriados: 100%</li></ul><br><strong>Calculo:</strong><ul><li>Hora = salario / 220h</li><li>Ex: R$ 2.200 - hora = R$ 10,00</li><li>Extra 50% = R$ 10 x 1,5 = R$ 15,00</li><li>Extra 100% = R$ 10 x 2,0 = R$ 20,00</li></ul><br>Limite: 2h extras por dia (art. 59 CLT).<br><br><em>Dica: Formalize com autorizacao escrita e registre no ponto.</em>",false],
["escala|12x36","Escala 12x36","Como funciona a escala 12x36?","A escala 12x36 e a mais comum para porteiros no RJ (Convencao SINDEPRESTEM/SEAERJ).<br><br><strong>Como funciona:</strong><ul><li>Trabalha 12h seguidas</li><li>Descansa 36h seguintes</li><li>Jornada mensal: aprox. 180h</li></ul><br><strong>Intervalo obrigatorio:</strong> 1h intrajornada (art. 71 CLT). Se nao concedido: 1h extra + 50%.<br><br>Domingos/feriados: sem adicional extra - descanso de 36h compensa (Sumula 444 TST).<br><br><em>Dica: Mantenha a escala assinada e avise alteracoes com 48h de antecedencia.</em>",false],
["interval","Intervalos","Quais sao os intervalos obrigatorios?","Intervalos sao obrigatorios e nao podem ser suprimidos.<br><br><strong>Intrajornada (art. 71 CLT):</strong><ul><li>Ate 4h: sem intervalo</li><li>De 4h a 6h: minimo 15 minutos</li><li>Acima de 6h: minimo 1 hora</li></ul><br><strong>Interjornada (art. 66 CLT):</strong><ul><li>Minimo 11h de descanso entre jornadas</li></ul><br>Se nao cumprido: periodo pago como hora extra + 50%.<br><br><em>Dica: Registre saida e retorno do intervalo no ponto.</em>",false],
["banco de hora","Banco de horas","Como funciona o banco de horas?","Permite compensar horas extras com folgas.<br><br><strong>Prazos:</strong><ul><li>Acordo individual escrito: ate 6 meses</li><li>Acordo coletivo: ate 1 ano</li></ul><br><strong>Regras:</strong><ul><li>Formalizar por escrito antes do inicio</li><li>Horas em domingos/feriados: pagas em dobro</li><li>Nao compensadas no prazo: pagas com 50% adicional</li><li>Na rescisao: saldo pago como horas extras</li></ul><br><em>Dica: Informe o saldo ao funcionario todo mes.</em>",false],
["descont|atraso","Descontos","Posso descontar atrasos do salario?","O condominio pode descontar atrasos e faltas injustificadas proporcionalmente.<br><br><strong>Calculo:</strong><ul><li>Hora = salario / 220 | Ex: R$ 2.200 - minuto = R$ 0,167</li><li>30min de atraso = R$ 5,00 de desconto</li></ul><br><strong>Falta injustificada:</strong> desconta 1 dia + DSR da semana.<br><br><strong>Faltas sem desconto:</strong><ul><li>Atestado medico valido (em 48h)</li><li>Casamento: 3 dias uteis</li><li>Falecimento: 2 dias</li><li>Doacao de sangue: 1 dia/ano</li></ul><br><em>Dica: Exija atestado em ate 48h. Sem prazo = falta injustificada.</em>",false],
["ponto|registro|relogio","Registro de ponto","Como registrar o ponto dos funcionarios?","O registro de ponto protege o condominio em acoes trabalhistas.<br><br><strong>Formas aceitas (Portaria 671/2021):</strong><ul><li>REP-C: relogio eletronico homologado</li><li>REP-P: sistema via app homologado</li><li>Folha manual assinada pelo empregado</li><li>Ponto por excecao: so variacoes (exige acordo coletivo)</li></ul><br>Deve constar: entrada, saida/retorno do intervalo e saida final.<br><strong>Prazo de guarda: 5 anos.</strong><br><br><em>Dica: Nunca deixe folhas em branco para assinar depois - invalidas na Justica.</em>",true],
["noturno","Adicional noturno","Como funciona o adicional noturno?","Devido a todos que trabalham entre 22h e 5h (art. 73 CLT).<br><br><strong>Adicional: 20%</strong> sobre a hora diurna.<br>Hora noturna reduzida = 52min 30s (nao 60min).<br><br><strong>Calculo:</strong><ul><li>R$ 2.200 / 220 = R$ 10 + 20% = R$ 12,00/hora noturna</li></ul><br><em>Dica: Hora extra noturna acumula: 50% extra + 20% noturno.</em>",false],
["feria","Ferias","Como funcionam as ferias?","Todo funcionario tem direito a 30 dias de ferias apos 12 meses (art. 129 CLT).<br><br><strong>Prazo:</strong> nos 12 meses seguintes. Se nao concedidas, o valor dobra.<br><br><strong>Remuneracao:</strong> salario + 1/3 constitucional<br>Ex: R$ 2.200 + R$ 733 = R$ 2.933<br><br><strong>Pagamento:</strong> ate 2 dias antes do inicio.<br>Parcelamento: ate 3 periodos, minimo 14 dias em um deles.<br><br><em>Dica: Notifique por escrito 30 dias antes e guarde o recibo.</em>",false],
["rescis|demiss|demitir","Rescisao","Como fazer a rescisao de um funcionario?","<strong>Demissao sem justa causa:</strong><ul><li>Aviso previo: 30 dias + 3 dias/ano (max. 90)</li><li>Saldo + ferias + 1/3 + 13 proporcional</li><li>FGTS + multa de 40% + seguro-desemprego</li></ul><br><strong>Pedido de demissao:</strong><ul><li>Aviso de 30 dias, saldo + ferias + 1/3 + 13</li><li>Sem multa FGTS e sem seguro-desemprego</li></ul><br><em>Dica: Formalize com SEAERJ. Atraso = multa de 1 salario/dia.</em>",false],
["zelador|moradia","Zelador","Quais sao as regras para o zelador?","O zelador residente tem regras especiais.<br><br><strong>Jornada:</strong> 8h/dia, 44h/semana.<br><ul><li>Sobreaviso: 1/3 da hora</li><li>Trabalho efetivo fora do horario: hora extra + 50%</li></ul><br><strong>Moradia:</strong> natureza salarial - integra FGTS, INSS e ferias.<br><br><em>Dica: Formalize o valor da moradia no contrato como salario in natura.</em>",false],
["13|decimo","13 salario","Como calcular o 13 salario?","O 13 salario e obrigatorio para todo empregado (Lei 4.090/1962).<br><br><strong>Pagamento:</strong><ul><li>1a parcela: entre fevereiro e novembro</li><li>2a parcela: ate 20 de dezembro</li></ul><br><strong>Calculo proporcional:</strong><ul><li>Meses trabalhados / 12 x salario</li><li>Ex: 8 meses, R$ 2.200: 8/12 x R$ 2.200 = R$ 1.466,67</li><li>15 dias ou mais no mes = mes inteiro conta</li></ul><br>Incide INSS, FGTS e IR.<br><br><em>Dica: Planeje o caixa do condominio com antecedencia para o 13.</em>",false],
["garagista|garagem","Garagista","Qual e a jornada do garagista?","O garagista segue as regras gerais da CLT.<br><br><strong>Jornada:</strong> 8h/dia, 44h/semana.<br><strong>Escalas comuns:</strong> 6x1 ou 12x36.<br><br><strong>EPIs obrigatorios:</strong><ul><li>Colete refletivo</li><li>Calcado de seguranca</li></ul><br><strong>Adicional noturno:</strong> 20% se trabalhar entre 22h e 5h.<br><br><em>Dica: Defina as funcoes no contrato para evitar desvio de funcao.</em>",false],
["faxin|servent|limpeza","Faxineiro","Qual e a jornada do faxineiro?","O faxineiro segue as regras gerais da CLT.<br><br><strong>Jornada:</strong> 8h/dia, 44h/semana.<br><strong>Escalas comuns:</strong> 5x2 ou 6x1.<br><br><strong>EPIs obrigatorios (NR-6):</strong><ul><li>Luvas de borracha</li><li>Botas impermeaveis</li><li>Avental impermeavel</li><li>Oculos de protecao</li></ul><br><strong>Uniforme:</strong> fornecido e higienizado pelo condominio.<br><br><em>Dica: Documente a entrega dos EPIs com assinatura - protege em caso de acidente.</em>",false],
["inss|fgts|previdencia","INSS e FGTS","Como funciona o INSS e FGTS?","<strong>FGTS:</strong><ul><li>Aliquota: 8% sobre a remuneracao bruta</li><li>Recolhimento ate dia 7 do mes seguinte</li><li>Base: salario + extras + noturno + 13 + ferias</li></ul><br><strong>INSS (descontado do empregado):</strong><ul><li>Ate R$ 1.412: 7,5%</li><li>Ate R$ 2.666: 9%</li><li>Ate R$ 4.000: 12%</li><li>Ate R$ 7.786: 14%</li></ul><br><strong>INSS patronal:</strong> 20% + RAT + terceiros.<br><br><em>Dica: Condominios residenciais podem ter reducao - consulte seu contador.</em>",false],
["atestado|medic|licenca|afasta","Atestado medico","Como tratar atestados medicos?","O atestado valido garante ausencia sem desconto salarial.<br><br><strong>Regras:</strong><ul><li>Apresentar em ate 48h apos a falta</li><li>Deve ter: CID, periodo, CRM do medico e assinatura</li></ul><br><strong>Afastamento pelo INSS (acima de 15 dias):</strong><ul><li>Primeiros 15 dias: pago pelo condominio</li><li>Do 16 dia em diante: INSS assume</li></ul><br><strong>Licenca-maternidade:</strong> 120 dias, pago pelo INSS.<br><br><em>Dica: Guarde todos os atestados - em acao trabalhista o onus da prova e do condominio.</em>",false],
["aviso","Aviso previo","Como funciona o aviso previo?","O aviso previo e obrigatorio tanto na demissao quanto no pedido de demissao.<br><br><strong>Prazo:</strong><ul><li>30 dias para ate 1 ano de servico</li><li>+ 3 dias por ano trabalhado (max. 90 dias total)</li><li>Ex: 5 anos: 30 + 15 = 45 dias de aviso</li></ul><br><strong>Reducao de jornada no aviso:</strong><ul><li>Pode reduzir 2h/dia, OU</li><li>Faltar os ultimos 7 dias corridos</li></ul><br><em>Dica: Sempre formalize o aviso por escrito com assinatura de ambos.</em>",false],
["feriado","Feriados","Como funciona o trabalho em feriados?","Trabalho em feriado deve ser remunerado com 100% de adicional (hora em dobro).<br><br><strong>Feriados nacionais:</strong> 01/01, 21/04, 01/05, 07/09, 12/10, 02/11, 15/11, 25/12.<br><br><strong>Feriados municipais do RJ:</strong><ul><li>20 de janeiro - Sao Sebastiao</li><li>23 de abril - Dia de Sao Jorge</li><li>20 de novembro - Consciencia Negra</li></ul><br><strong>Escala 12x36:</strong> sem adicional em feriado - descanso de 36h compensa (Sumula 444 TST).<br><br><em>Dica: Verifique o calendario de feriados municipais do RJ todo ano.</em>",false],

function encontrar(p) {
  var t = p.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
  for (var i = 0; i < TOPICS.length; i++) {
    var keys = TOPICS[i][0].split("|");
    for (var j = 0; j < keys.length; j++) {
      if (t.includes(keys[j])) return TOPICS[i];
    }
  }
  return null;
}

function add(role, html, tag) {
  var w = document.getElementById("chat");
  var d = document.createElement("div");
  d.className = "msg " + (role === "user" ? "user" : "ai");
  var av = document.createElement("div");
  av.className = "av " + (role === "user" ? "uv" : "ai");
  av.textContent = role === "user" ? "SIN" : "IK";
  var bbl = document.createElement("div");
  bbl.className = "bubble";
  if (tag) { var tg = document.createElement("div"); tg.className = "btag"; tg.textContent = "Orientacao Trabalhista"; bbl.appendChild(tg); }
  var cnt = document.createElement("div");
  cnt.innerHTML = html;
  bbl.appendChild(cnt);
  d.appendChild(av);
  d.appendChild(bbl);
  w.appendChild(d);
  w.scrollTop = w.scrollHeight;
}

function typing(show) {
  var t = document.getElementById("trow");
  if (show && !t) {
    var w = document.getElementById("chat");
    var d = document.createElement("div");
    d.className = "msg ai"; d.id = "trow";
    var av = document.createElement("div"); av.className = "av ai"; av.textContent = "IK";
    var tb = document.createElement("div"); tb.className = "typing-bubble";
    for (var i=0;i<3;i++){var dot=document.createElement("div");dot.className="tdot";tb.appendChild(dot);}
    d.appendChild(av); d.appendChild(tb);
    w.appendChild(d); w.scrollTop = w.scrollHeight;
  } else if (!show && t) { t.remove(); }
}

function fmt(t) {
  return t.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
    .replace(/\*(.*?)\*/g, "<em>$1</em>")
    .replace(/^- (.+)$/gm, "<li>$1</li>")
    .replace(/(<li>.*?<\/li>\n?)+/gs, function(m) { return "<ul>" + m + "</ul>"; })
    .replace(/\n\n/g, "<br><br>").replace(/\n/g, "<br>");
}

async function send(text) {
  if (!text.trim()) return;
  document.getElementById("btn").disabled = true;
  add("user", text, false);
  chatHistory.push({ role: "user", content: text });
  var found = encontrar(text);
  if (found) {
    typing(true);
    setTimeout(function() {
      typing(false);
      var resp = found[3] + (found[4] ? IKP : IK);
      chatHistory.push({ role: "assistant", content: resp });
      add("assistant", resp, true);
      document.getElementById("btn").disabled = false;
      document.getElementById("inp").focus();
    }, 600);
    return;
  }
  typing(true);
  try {
    var res = await fetch("/api/chat", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ model: "claude-3-haiku-20240307", max_tokens: 1500, system: SYS, messages: chatHistory }) });
    if (!res.ok) { var e = await res.json().catch(function() { return {}; }); throw new Error(e.error ? e.error.message : "Erro " + res.status); }
    var data = await res.json();
    var reply = data.content && data.content[0] ? data.content[0].text : "Sem resposta.";
    chatHistory.push({ role: "assistant", content: reply });
    typing(false);
    add("assistant", fmt(reply), true);
  } catch(e) {
    typing(false);
    add("assistant", "Sua pergunta vai alem do banco de respostas. Fale com a InfoKings: <a href='https://wa.me/552122214155' target='_blank'>(21) 2221-4155</a>", false);
  }
  document.getElementById("btn").disabled = false;
  document.getElementById("inp").focus();
}

function S() { var i = document.getElementById("inp"); var t = i.value.trim(); if (!t) return; i.value = ""; i.style.height = "auto"; send(t); }
function Q(q) { send(q); }
function K(e) { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); S(); } }
