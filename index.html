<head>

<title>IKSíndico — Assistente Trabalhista</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#040d1a;--blue-mid:#0d2a52;--blue-accent:#1a5fb4;--gold:#f5a623;--gold-light:#ffc55a;--white:#fff;--muted:rgba(255,255,255,0.55);--border:rgba(255,255,255,0.08);--glow:rgba(26,95,180,0.4)}
html,body{height:100%;height:100dvh;background:var(--navy);color:var(--white);font-family:'Barlow',sans-serif;overflow:hidden;-webkit-text-size-adjust:100%}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 70% 20%,rgba(26,95,180,0.18) 0%,transparent 70%),radial-gradient(ellipse 60% 50% at 10% 80%,rgba(26,95,180,0.12) 0%,transparent 60%);pointer-events:none;z-index:0}
.grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(26,95,180,0.06) 1px,transparent 1px),linear-gradient(90deg,rgba(26,95,180,0.06) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.app{position:relative;z-index:1;display:flex;flex-direction:column;height:100%;height:100dvh;max-width:1100px;margin:0 auto}
nav{display:flex;align-items:center;padding:0 16px;height:56px;border-bottom:1px solid var(--border);background:rgba(4,13,26,0.95);backdrop-filter:blur(12px);flex-shrink:0;gap:8px}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none}
.logo-icon{width:32px;height:32px;flex-shrink:0}
.logo-icon svg{width:32px;height:32px}
.logo-text{font-family:'Exo 2',sans-serif;font-weight:800;font-size:18px;color:var(--white);letter-spacing:-0.3px}
.logo-text span{color:var(--gold)}
.nav-badge{font-size:9px;font-weight:700;font-family:'Exo 2',sans-serif;letter-spacing:1px;color:var(--gold);border:1px solid rgba(245,166,35,0.3);padding:2px 7px;border-radius:20px;text-transform:uppercase}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)}
.online-dot{width:7px;height:7px;background:#4ade80;border-radius:50%;box-shadow:0 0 6px #4ade80;animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.hero-strip{background:linear-gradient(90deg,var(--blue-mid) 0%,rgba(10,29,58,0.7) 100%);border-bottom:1px solid var(--glow);padding:10px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.hero-icon{width:38px;height:38px;background:rgba(245,166,35,0.12);border:1px solid rgba(245,166,35,0.25);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hero-icon svg{width:19px;height:19px}
.hero-text{flex:1;min-width:0}
.hero-text h1{font-family:'Exo 2',sans-serif;font-size:13px;font-weight:700;color:var(--white);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hero-text p{font-size:10px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chips-wrap{border-bottom:1px solid var(--border);padding:8px 16px;display:flex;gap:7px;overflow-x:auto;flex-shrink:0;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.chips-wrap::-webkit-scrollbar{display:none}
.chip{font-size:11px;font-weight:600;padding:6px 12px;border-radius:20px;border:1px solid var(--glow);color:rgba(255,255,255,0.75);background:rgba(26,95,180,0.18);white-space:nowrap;cursor:pointer;transition:all 0.15s;font-family:'Exo 2',sans-serif;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.chip:active{background:var(--gold);color:var(--navy);border-color:var(--gold)}
.chat-wrap{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.msg{display:flex;gap:10px;animation:fadeUp 0.2s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse}
.av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Exo 2',sans-serif;font-size:10px;font-weight:700;flex-shrink:0;margin-top:2px}
.av.ai{background:linear-gradient(135deg,var(--blue-accent),#0d2a52);border:1px solid rgba(26,95,180,0.5);color:#fff}
.av.uv{background:linear-gradient(135deg,var(--gold),#d4860d);color:var(--navy)}
.bubble{max-width:82%;padding:11px 14px;border-radius:14px;font-size:14px;line-height:1.6}
.msg.ai .bubble{background:rgba(255,255,255,0.06);border:1px solid var(--border);border-top-left-radius:4px;color:rgba(255,255,255,0.9)}
.msg.user .bubble{background:var(--blue-accent);border:1px solid rgba(26,95,180,0.5);border-top-right-radius:4px;color:#fff}
.btag{display:inline-block;font-size:10px;font-weight:600;font-family:'Exo 2',sans-serif;letter-spacing:0.5px;text-transform:uppercase;padding:2px 8px;border-radius:20px;margin-bottom:7px;background:rgba(245,166,35,0.15);color:var(--gold-light);border:1px solid rgba(245,166,35,0.2)}
.bubble strong{font-weight:600;color:var(--gold-light)}
.bubble em{color:rgba(255,255,255,0.65);font-style:italic}
.bubble ul{padding-left:16px;margin-top:5px;display:flex;flex-direction:column;gap:3px}
.bubble li{font-size:13.5px;color:rgba(255,255,255,0.85)}
.bubble a{color:var(--gold-light)}
.ik-card{margin-top:12px;padding:10px 12px;background:rgba(245,166,35,0.07);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;font-size:12px;color:rgba(255,255,255,0.7);line-height:1.6}
.ik-card strong{color:var(--gold)}
.ik-card a{color:var(--gold);text-decoration:none}
.typing-bubble{display:flex;gap:5px;padding:12px 14px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:14px;border-top-left-radius:4px;width:fit-content}
.tdot{width:6px;height:6px;background:rgba(255,255,255,0.35);border-radius:50%;animation:tdot 1.3s infinite ease-in-out}
.tdot:nth-child(2){animation-delay:0.2s}.tdot:nth-child(3){animation-delay:0.4s}
@keyframes tdot{0%,60%,100%{transform:translateY(0);background:rgba(255,255,255,0.3)}30%{transform:translateY(-5px);background:var(--gold)}}
.input-section{flex-shrink:0;border-top:1px solid var(--border);background:rgba(4,13,26,0.97);padding:10px 16px 12px;padding-bottom:max(12px,env(safe-area-inset-bottom))}
.input-row{display:flex;gap:8px;align-items:flex-end}
.input-row textarea{flex:1;resize:none;border:1px solid rgba(26,95,180,0.35);border-radius:12px;padding:10px 14px;color:var(--white);font-family:'Barlow',sans-serif;font-size:15px;line-height:1.45;background:rgba(255,255,255,0.06);outline:none;max-height:110px;transition:border-color 0.2s;-webkit-appearance:none}
.input-row textarea::placeholder{color:rgba(255,255,255,0.28)}
.input-row textarea:focus{border-color:var(--blue-accent)}
.send-btn{width:44px;height:44px;min-width:44px;background:var(--gold);border:none;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.send-btn:active{background:var(--gold-light);transform:scale(0.95)}
.send-btn:disabled{opacity:0.35;cursor:default}
.send-btn svg{width:17px;height:17px}
.disclaimer{margin-top:6px;font-size:10px;color:rgba(255,255,255,0.2);text-align:center;line-height:1.4}
</style>
</head>
<body>

<script>
var chatHistory = [];

var IK = '<div class="ik-card"><strong>💼 InfoKings pode ajudar:</strong> Fornecemos relógios de ponto <strong>biométricos e faciais</strong> (venda ou locação) e o <strong>IKPontoWeb</strong> — automatiza horas extras, banco de horas e gera a folha pronta para contabilidade.<br><span style="font-size:11px;color:rgba(255,255,255,0.4);">📞 <a href="https://wa.me/552122214155" target="_blank">(21) 2221-4155</a> &nbsp;·&nbsp; <a href="https://infokings.com.br" target="_blank">infokings.com.br</a></span></div>';

var IK_PONTO = '<div class="ik-card"><strong>💼 InfoKings é especialista nisso:</strong> Há 24 anos fornecemos relógios de ponto <strong>biométricos e faciais</strong> (venda ou locação) e o <strong>IKPontoWeb</strong> — 100% online, trata marcações, gera espelho de ponto, controla banco de horas e exporta para sua folha. Conforme Portaria 671/2021.<br><span style="font-size:11px;color:rgba(255,255,255,0.4);">📞 <a href="https://wa.me/552122214155" target="_blank">(21) 2221-4155</a> &nbsp;·&nbsp; <a href="https://infokings.com.br" target="_blank">infokings.com.br</a></span></div>';

var KB = {
  "horas extras": {
    label: "Horas extras",
    q: "Como calcular horas extras do porteiro?",
    r: "O porteiro tem direito a adicional sobre horas além da jornada normal.<br><br><strong>Adicionais:</strong><ul><li>Dias úteis e sábados: <strong>50%</strong></li><li>Domingos e feriados: <strong>100%</strong></li></ul><br><strong>Como calcular:</strong><ul><li>Hora = salário ÷ 220h</li><li>Ex: R$ 2.200 → hora = R$ 10,00</li><li>Extra 50% = R$ 10 × 1,5 = <strong>R$ 15,00</strong></li><li>Extra 100% = R$ 10 × 2,0 = <strong>R$ 20,00</strong></li></ul><br>Limite: <strong>2h extras por dia</strong> (art. 59 CLT).<br><br><em>💡 Dica: Formalize com autorização escrita e registre no ponto.</em>" + IK
  },
  "escala 12x36": {
    label: "Escala 12x36",
    q: "Como funciona a escala 12x36 para porteiros?",
    r: "A escala 12×36 é a mais comum para porteiros no RJ (Convenção SINDEPRESTEM/SEAERJ).<br><br><strong>Como funciona:</strong><ul><li>Trabalha <strong>12h</strong> seguidas</li><li>Descansa <strong>36h</strong> seguintes</li><li>Repete independente de domingos/feriados</li><li>Jornada mensal: ~180h</li></ul><br><strong>Intervalo obrigatório:</strong> 1h intrajornada (art. 71 CLT). Se não concedido: paga-se 1h extra + 50%.<br><br>Domingos/feriados na 12×36: sem adicional extra — descanso de 36h compensa (Súmula 444 TST).<br><br><em>💡 Dica: Mantenha a escala assinada e avise alterações com 48h de antecedência.</em>" + IK
  },
  "intervalos": {
    label: "Intervalos",
    q: "Quais são os intervalos obrigatórios?",
    r: "Intervalos são obrigatórios por lei e não podem ser suprimidos.<br><br><strong>Intrajornada (art. 71 CLT):</strong><ul><li>Até 4h: sem intervalo</li><li>De 4h a 6h: mínimo <strong>15 minutos</strong></li><li>Acima de 6h: mínimo <strong>1 hora</strong></li></ul><br><strong>Interjornada (art. 66 CLT):</strong><ul><li>Mínimo <strong>11h</strong> de descanso entre jornadas</li></ul><br>Se não cumprido: período pago como hora extra + 50% (art. 71 §4º CLT).<br><br><em>💡 Dica: Registre saída e retorno do intervalo no ponto.</em>" + IK
  },
  "banco de horas": {
    label: "Banco de horas",
    q: "Como funciona o banco de horas no condomínio?",
    r: "Permite compensar horas extras com folgas em vez de pagamento.<br><br><strong>Prazos:</strong><ul><li>Acordo individual escrito: até <strong>6 meses</strong></li><li>Acordo coletivo (sindicato): até <strong>1 ano</strong></li></ul><br><strong>Regras:</strong><ul><li>Formalizar por escrito antes do início</li><li>Horas em domingos/feriados: pagas em dobro, não entram no banco</li><li>Não compensadas no prazo: pagas com 50% adicional</li><li>Na rescisão: saldo pago como horas extras</li></ul><br><em>💡 Dica: Informe o saldo ao funcionário todo mês para evitar surpresas.</em>" + IK
  },
  "descontos": {
    label: "Descontos",
    q: "Posso descontar atrasos do salário?",
    r: "Sim. O condomínio pode descontar atrasos e faltas injustificadas proporcionalmente.<br><br><strong>Cálculo:</strong><ul><li>Hora = salário ÷ 220 | Ex: R$ 2.200 → minuto = R$ 0,167</li><li>30min de atraso = <strong>R$ 5,00 de desconto</strong></li></ul><br><strong>Falta injustificada:</strong> desconta 1 dia + DSR da semana.<br><br><strong>Faltas sem desconto:</strong><ul><li>Atestado médico válido (apresentar em 48h)</li><li>Casamento: 3 dias úteis</li><li>Falecimento de familiar: 2 dias</li><li>Doação de sangue: 1 dia/ano</li></ul><br><em>💡 Dica: Exija atestado em até 48h. Sem prazo = falta injustificada.</em>" + IK
  },
  "registro de ponto": {
    label: "Registro de ponto",
    q: "Como registrar o ponto dos funcionários?",
    r: "O registro de ponto protege o condomínio em ações trabalhistas.<br><br><strong>Formas aceitas (Portaria 671/2021):</strong><ul><li>REP-C: relógio eletrônico homologado</li><li>REP-P: sistema via app homologado</li><li>Folha manual assinada pelo empregado</li><li>Ponto por exceção: só variações (exige acordo coletivo)</li></ul><br>Deve constar: entrada, saída/retorno do intervalo e saída final.<br><strong>Prazo de guarda: 5 anos.</strong><br><br><em>💡 Dica: Nunca deixe folhas em branco para assinar depois — são inválidas na Justiça.</em>" + IK_PONTO
  },
  "adicional noturno": {
    label: "Adicional noturno",
    q: "Como funciona o adicional noturno?",
    r: "Devido a todos que trabalham entre <strong>22h e 5h</strong> (art. 73 CLT).<br><br><strong>Adicional: 20%</strong> sobre a hora diurna.<br>Hora noturna reduzida = <strong>52min 30s</strong> (não 60min).<br><br><strong>Cálculo:</strong><ul><li>R$ 2.200 ÷ 220 = R$ 10 → + 20% = <strong>R$ 12,00/hora noturna</strong></li></ul><br><em>💡 Dica: Hora extra noturna acumula dois adicionais: 50% (extra) + 20% (noturno).</em>" + IK
  },
  "ferias": {
    label: "Férias",
    q: "Como funcionam as férias dos funcionários?",
    r: "Todo funcionário tem direito a <strong>30 dias de férias</strong> após 12 meses de trabalho (art. 129 CLT).<br><br><strong>Prazo de concessão:</strong> nos 12 meses seguintes ao período aquisitivo. Se não concedidas, o valor <strong>dobra</strong>.<br><br><strong>Remuneração:</strong> salário + <strong>1/3 constitucional</strong><br>Ex: R$ 2.200 + R$ 733 = <strong>R$ 2.933</strong><br><br><strong>Pagamento:</strong> até <strong>2 dias antes</strong> do início.<br>Parcelamento: até 3 períodos, mínimo 14 dias em um deles.<br><br><em>💡 Dica: Notifique por escrito 30 dias antes e guarde o recibo assinado.</em>" + IK
  },
  "rescisao": {
    label: "Rescisão",
    q: "Como fazer a rescisão de um funcionário?",
    r: "<strong>Demissão sem justa causa (pelo condomínio):</strong><ul><li>Aviso prévio: 30 dias + 3 dias/ano trabalhado (máx. 90)</li><li>Saldo de salário + férias + 1/3 + 13º proporcional</li><li>FGTS + multa de <strong>40%</strong> sobre o saldo + seguro-desemprego</li></ul><br><strong>Pedido de demissão (funcionário):</strong><ul><li>Aviso de 30 dias, saldo + férias + 1/3 + 13º proporcional</li><li>Sem multa FGTS e sem seguro-desemprego</li></ul><br><em>💡 Dica: Formalize com SEAERJ. Atraso no pagamento = multa de 1 salário/dia.</em>" + IK
  },
  "zelador": {
    label: "Zelador",
    q: "Quais são as regras para o zelador residente?",
    r: "O zelador residente tem regras especiais de jornada.<br><br><strong>Jornada:</strong> 8h/dia, 44h/semana.<br><ul><li>Sobreaviso (disponível para chamar): <strong>1/3 da hora</strong></li><li>Trabalho efetivo fora do horário: hora extra + 50%</li></ul><br><strong>Moradia como benefício:</strong><ul><li>Natureza salarial — integra FGTS, INSS e férias</li><li>Valor definido pela Convenção Coletiva</li></ul><br><em>💡 Dica: Formalize o valor da moradia no contrato como salário in natura.</em>" + IK
  },
  "13 salario": {
    label: "13º Salário",
    q: "Como calcular o 13º salário dos funcionários?",
    r: "O 13º salário é obrigatório para todo empregado (Lei 4.090/1962).<br><br><strong>Valor:</strong> equivale a 1 salário mensal completo, pago proporcionalmente.<br><br><strong>Pagamento:</strong><ul><li><strong>1ª parcela:</strong> entre fevereiro e novembro (ou na entrada de férias)</li><li><strong>2ª parcela:</strong> até 20 de dezembro</li></ul><br><strong>Cálculo proporcional:</strong><ul><li>Meses trabalhados ÷ 12 × salário</li><li>Ex: 8 meses, salário R$ 2.200 → 8 ÷ 12 × R$ 2.200 = <strong>R$ 1.466,67</strong></li><li>15 dias ou mais no mês = mês inteiro conta</li></ul><br><strong>Incide sobre o 13º:</strong> INSS, FGTS e IR (se aplicável).<br><br><em>💡 Dica: Planeje o caixa do condomínio para o 13º com antecedência — é uma das principais reclamações trabalhistas por atraso.</em>" + IK
  },
  "garagista": {
    label: "Jornada garagista",
    q: "Qual é a jornada de trabalho do garagista?",
    r: "O garagista de condomínio segue as regras gerais da CLT com algumas especificidades.<br><br><strong>Jornada padrão:</strong><ul><li>8h diárias / 44h semanais</li><li>Intervalo mínimo de 1h para jornadas acima de 6h (art. 71 CLT)</li></ul><br><strong>Escala mais comum:</strong> 6×1 (trabalha 6 dias, folga 1) ou 12×36.<br><br><strong>Atividades típicas:</strong> controle de entrada e saída de veículos, organização de vagas, segurança do estacionamento.<br><br><strong>Equipamentos obrigatórios (EPI):</strong> colete refletivo, calçado de segurança.<br><br><strong>Adicional noturno:</strong> se trabalhar entre 22h e 5h, tem direito a 20% adicional (art. 73 CLT).<br><br><em>💡 Dica: Defina claramente no contrato as funções do garagista para evitar desvio de função — que pode gerar acúmulo de funções e pedido de diferença salarial.</em>" + IK
  },
  "faxineiro": {

function encontrar(p) {
  var t = p.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  if(t.includes("hora extra")||t.includes("calcular hora")) return KB["horas extras"].r;
  if(t.includes("12x36")||t.includes("12 x 36")||t.includes("escala")) return KB["escala 12x36"].r;
  if(t.includes("interval")) return KB["intervalos"].r;
  if(t.includes("banco de hora")) return KB["banco de horas"].r;
  if(t.includes("descont")||t.includes("atraso")||(t.includes("falta")&&!t.includes("relogio")&&!t.includes("atestado"))) return KB["descontos"].r;
  if(t.includes("ponto")||t.includes("registro")||t.includes("relogio")) return KB["registro de ponto"].r;
  if(t.includes("noturno")||t.includes("noturna")) return KB["adicional noturno"].r;
  if(t.includes("ferias")) return KB["ferias"].r;
  if(t.includes("rescis")||t.includes("demiss")||t.includes("demitir")) return KB["rescisao"].r;
  if(t.includes("zelador")||t.includes("moradia")) return KB["zelador"].r;
  if(t.includes("13")||t.includes("decimo")) return KB["13 salario"].r;
  if(t.includes("garagista")||t.includes("garagem")) return KB["garagista"].r;
  if(t.includes("faxin")||t.includes("servent")||t.includes("limpeza")) return KB["faxineiro"].r;
  if(t.includes("inss")||t.includes("fgts")||t.includes("previdencia")) return KB["inss fgts"].r;
  if(t.includes("atestado")||t.includes("medic")||t.includes("licenca")||t.includes("afasta")) return KB["atestado"].r;
  if(t.includes("aviso")||t.includes("aviso previo")) return KB["aviso previo"].r;
  if(t.includes("feriado")) return KB["feriados"].r;
  if(t.includes("uniforme")||t.includes("epi")||t.includes("equipamento")) return KB["uniforme epi"].r;
  if(t.includes("convencao")||t.includes("sindeprestem")||t.includes("seaerj")) return KB["convencao coletiva"].r;
  return null;
}

function add(role, html, tag) {

  d.className = "msg "+(role==="user"?"user":"ai");
  d.innerHTML='<div class="av '+(role==="user"?"uv":"ai")+'">'+(role==="user"?"SÍN":"IK")+'</div><div class="bubble">'+(tag?'<div class="btag">Orientação Trabalhista</div>':"")+html+"</div>";
  w.appendChild(d);
  w.scrollTop=w.scrollHeight;
}

function typing(show) {
  var t=document.getElementById("trow");
  if(show&&!t){
    var w=document.getElementById("chat");
    var d=document.createElement("div");
    d.className="msg ai";d.id="trow";
    d.innerHTML='<div class="av ai">IK</div><div class="typing-bubble"><div class="tdot"></div><div class="tdot"></div><div class="tdot"></div></div>';
    w.appendChild(d);w.scrollTop=w.scrollHeight;

}

function fmt(t) {
  return t.replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>")
    .replace(/\*(.*?)\*/g,"<em>$1</em>")
    .replace(/^#{1,3} (.+)$/gm,"<br><strong style='color:#ffc55a'>$1</strong><br>")
    .replace(/^- (.+)$/gm,"<li>$1</li>")
    .replace(/(<li>.*?<\/li>\n?)+/gs,function(m){return "<ul>"+m+"</ul>";})
    .replace(/\n\n/g,"<br><br>").replace(/\n/g,"<br>");
}

async function send(text) {
  if(!text.trim()) return;
  document.getElementById("btn").disabled=true;
  add("user",text,false);
  chatHistory.push({role:"user",content:text});
  var resp=encontrar(text);
  if(resp){
    typing(true);
    setTimeout(function(){
      typing(false);
      chatHistory.push({role:"assistant",content:resp});
      add("assistant",resp,true);
      document.getElementById("btn").disabled=false;
      document.getElementById("inp").focus();
    },600);
    return;
  }
  typing(true);
  try {
    var res=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-3-haiku-20240307",max_tokens:1500,system:SYSTEM,messages:chatHistory})});
    if(!res.ok){var e=await res.json().catch(function(){return{};});throw new Error(e.error?e.error.message:"Erro "+res.status);}
    var data=await res.json();
    var reply=data.content&&data.content[0]?data.content[0].text:"Sem resposta.";
    chatHistory.push({role:"assistant",content:reply});
    typing(false);
    add("assistant",fmt(reply),true);
  } catch(e) {
    typing(false);
    add("assistant","Sua pergunta vai além do banco de respostas. Experimente os atalhos acima ou fale com a InfoKings: <a href='https://wa.me/552122214155' target='_blank'><strong>(21) 2221-4155</strong></a>",false);
  }
  document.getElementById("btn").disabled=false;
  document.getElementById("inp").focus();
}
